# base/app-service.yaml — ផ្លាស់ type
apiVersion: v1
kind: Service
metadata:
  name: devconnect-app
spec:
  selector:
    app: devconnect
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8080
      nodePort: 30080       # ← port ដែល access ពីក្រៅ
  type: NodePort            # ← ពី ClusterIP → NodePort